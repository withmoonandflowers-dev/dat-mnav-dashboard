[build]
  command = "npx vite build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

# Cache API responses at CDN edge for 5 minutes
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Cache-Control = "public, max-age=300, s-maxage=300"
    Access-Control-Allow-Origin = "*"
